name: Deploy EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t api .

      - name: Tag image
        run: |
          docker tag api:latest \
          943938400335.dkr.ecr.us-east-1.amazonaws.com/node-services

      - name: Push image
        run: |
          docker push \
          943938400335.dkr.ecr.us-east-1.amazonaws.com/node-services

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig \
          --region us-east-1 \
          --name mi-cluster

      - name: Actualizar deployment
        run: |
          kubectl set image deployment/api \
          api=943938400335.dkr.ecr.us-east-1.amazonaws.com/node-services

      - name: Esperar rollout
        run: |
          kubectl rollout status deployment/api
